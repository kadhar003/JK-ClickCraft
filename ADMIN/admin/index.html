<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin Login | JK ClickCraft</title>
<link rel="stylesheet" href="css/admin-style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card glass">
    <div class="login-brand">
      <div class="login-brand__logo">JK</div>
      <h1>JK ClickCraft Admin</h1>
      <p>Sign in to manage customer reviews</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" placeholder="admin@jkclickcraft.in" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" required />
          <button type="button" class="toggle-password" id="togglePassword">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn--primary btn--block" id="loginBtn">Sign In</button>
    </form>

    <p class="login-footnote">Restricted access &middot; JK ClickCraft Admin Panel</p>
  </div>
</div>

<div id="toastContainer"></div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
